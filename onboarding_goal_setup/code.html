<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NutriFast - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#2a313d",
                        "surface-container-low": "#f0f3ff",
                        "secondary-container": "#fea619",
                        "tertiary-fixed": "#ffdad7",
                        "surface-dim": "#d3daea",
                        "on-secondary-fixed": "#2a1700",
                        "on-error": "#ffffff",
                        "on-secondary": "#ffffff",
                        "surface-container-highest": "#dce2f3",
                        "surface-bright": "#f9f9ff",
                        "on-error-container": "#93000a",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#860011",
                        "primary-fixed-dim": "#4ae176",
                        "surface-tint": "#006e2f",
                        "surface-container-high": "#e2e8f8",
                        "on-surface": "#151c27",
                        "on-primary": "#ffffff",
                        "surface-variant": "#dce2f3",
                        "on-primary-fixed-variant": "#005321",
                        "on-secondary-container": "#684000",
                        "tertiary-container": "#ff8a83",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#6bff8f",
                        "inverse-primary": "#4ae176",
                        "tertiary": "#b91a24",
                        "on-background": "#151c27",
                        "secondary-fixed-dim": "#ffb95f",
                        "primary": "#006e2f",
                        "tertiary-fixed-dim": "#ffb3ad",
                        "on-primary-container": "#004b1e",
                        "secondary-fixed": "#ffddb8",
                        "on-tertiary-fixed-variant": "#930013",
                        "secondary": "#855300",
                        "outline": "#6d7b6c",
                        "on-surface-variant": "#3d4a3d",
                        "inverse-on-surface": "#ebf1ff",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#653e00",
                        "surface": "#f9f9ff",
                        "outline-variant": "#bccbb9",
                        "primary-container": "#22c55e",
                        "on-tertiary-fixed": "#410004",
                        "surface-container": "#e7eefe",
                        "background": "#f9f9ff",
                        "on-primary-fixed": "#002109",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "24px",
                        "xl": "32px",
                        "touch-target": "44px",
                        "md": "16px",
                        "xs": "8px",
                        "base": "4px",
                        "sm": "12px",
                        "container-padding": "16px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "display-data": ["Inter"],
                        "caption": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-lg": ["30px", { "lineHeight": "38px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "display-data": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "caption": ["12px", { "lineHeight": "16px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Hide scrollbar for cleaner look, maintaining functionality */
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Input focus outline override for custom color */
        input:focus, select:focus {
            outline: none;
            box-shadow: 0 0 0 2px theme('colors.primary-container');
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md antialiased">
<!-- TopAppBar Content Canvas Area -->
<header class="w-full flex justify-center items-center px-container-padding h-touch-target top-0 sticky bg-surface/80 backdrop-blur-md z-40">
<div class="text-center">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Step 1 of 2</span>
<div class="w-24 h-1 bg-surface-container-high rounded-full mt-2 mx-auto overflow-hidden">
<div class="w-1/2 h-full bg-primary-container rounded-full"></div>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-container-padding flex flex-col pt-lg pb-xl max-w-md mx-auto w-full">
<div class="text-center mb-xl">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-xs">Set Your Goals</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Let's calculate the perfect nutritional plan for your body.</p>
</div>
<form class="flex flex-col gap-lg flex-grow">
<!-- Weight Inputs Container (Bento-style) -->
<div class="grid grid-cols-2 gap-md">
<!-- Current Weight -->
<div class="bg-surface-container-lowest rounded-[24px] p-md shadow-[0_4px_12px_rgba(0,0,0,0.05)] border border-surface-container-high">
<label class="font-label-md text-label-md text-on-surface-variant block mb-sm" for="current-weight">Current Weight</label>
<div class="relative flex items-center">
<input class="w-full h-touch-target bg-surface-bright rounded-lg px-sm font-headline-md text-headline-md text-on-surface border-none placeholder-surface-dim focus:ring-0" id="current-weight" placeholder="00.0" type="number"/>
<span class="absolute right-md font-label-md text-label-md text-on-surface-variant">kg</span>
</div>
</div>
<!-- Target Weight -->
<div class="bg-surface-container-lowest rounded-[24px] p-md shadow-[0_4px_12px_rgba(0,0,0,0.05)] border border-surface-container-high">
<label class="font-label-md text-label-md text-on-surface-variant block mb-sm" for="target-weight">Target Weight</label>
<div class="relative flex items-center">
<input class="w-full h-touch-target bg-surface-bright rounded-lg px-sm font-headline-md text-headline-md text-on-surface border-none placeholder-surface-dim focus:ring-0" id="target-weight" placeholder="00.0" type="number"/>
<span class="absolute right-md font-label-md text-label-md text-on-surface-variant">kg</span>
</div>
</div>
</div>
<!-- Activity Level Dropdown -->
<div class="bg-surface-container-lowest rounded-[24px] p-md shadow-[0_4px_12px_rgba(0,0,0,0.05)] border border-surface-container-high">
<label class="font-label-md text-label-md text-on-surface-variant block mb-sm" for="activity-level">Activity Level</label>
<div class="relative">
<select class="w-full h-touch-target bg-surface-bright rounded-lg px-sm font-body-lg text-body-lg text-on-surface border-none appearance-none focus:ring-0 cursor-pointer" id="activity-level">
<option disabled="" selected="" value="">Select your daily activity</option>
<option value="sedentary">Sedentary (Little to no exercise)</option>
<option value="light">Light (Exercise 1-3 days/week)</option>
<option value="moderate">Moderate (Exercise 3-5 days/week)</option>
<option value="active">Active (Exercise 6-7 days/week)</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" style="font-variation-settings: 'FILL' 0;">
                         expand_more
                     </span>
</div>
</div>
<!-- Spacer to push CTA to bottom -->
<div class="flex-grow"></div>
<!-- CTA -->
<button class="w-full h-touch-target bg-primary-container text-on-primary font-headline-md text-headline-md rounded-lg shadow-md hover:opacity-90 active:scale-95 transition-all duration-200 flex items-center justify-center gap-xs mt-xl" type="button">
                Calculate My Plan
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">
                    arrow_forward
                </span>
</button>
</form>
</main>
</body></html>
